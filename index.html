<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fuel Efficiency Estimator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef1f6;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* RESULT CARD */
.result-card {
  background: linear-gradient(135deg,#4c4cff,#7a4dff);
  color: white;
  padding: 25px;
  border-radius: 20px;
  margin-bottom: 25px;
}

.result-grid {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.metric {
  flex:1;
  text-align:center;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

.metric h1 { font-size:40px; margin:5px 0; }

/* CARDS */
.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 3px 12px rgba(0,0,0,0.05);
}

.section-title {
  font-weight:bold;
  margin-bottom:15px;
  color:#666;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input, select {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* SLIDER */
.slider { width:100%; }
.split-row { display:flex; justify-content:space-between; margin-top:10px; }

.tag {
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  margin-top:10px;
  font-size:13px;
}

.warn { background:#f5e6a7; color:#a66b00; }
.info { background:rgba(255,255,255,0.2); }
</style>
</head>

<body>

<div class="container">

<!-- RESULT -->
<div class="result-card">
  <div>⚡ ESTIMATED MILEAGE</div>

  <div class="result-grid">
    <div class="metric">
      CITY
      <h1 id="cityOut">0</h1>
      km/l
    </div>
    <div class="metric">
      HIGHWAY
      <h1 id="highwayOut">0</h1>
      km/l
    </div>
    <div class="metric">
      OVERALL
      <h1 id="overallOut">0</h1>
      km/l
    </div>
  </div>

  <div id="tags"></div>
</div>

<!-- ENGINE -->
<div class="card">
  <div class="section-title">ENGINE & TRANSMISSION</div>
  <div class="grid">
    <select id="engine">
      <option value="na">Petrol (NA)</option>
      <option value="turbo">Petrol (Turbo)</option>
      <option value="diesel">Diesel</option>
    </select>

    <input id="cc" value="1500" type="number" step="100">

    <select id="trans">
      <option value="manual">Manual</option>
      <option value="cvt">CVT</option>
      <option value="dct">DCT</option>
    </select>

    <select id="vehicle">
      <option value="compactSUV">Compact SUV</option>
      <option value="sedan">Sedan</option>
      <option value="hatch">Hatchback</option>
    </select>
  </div>
</div>

<!-- DRIVING -->
<div class="card">
  <div class="section-title">DRIVING CONDITIONS</div>
  <div class="grid">
    <select id="style">
      <option value="normal">Normal</option>
      <option value="gentle">Gentle</option>
      <option value="aggressive">Aggressive</option>
    </select>

    <select id="ac">
      <option value="normal">Normal</option>
      <option value="off">Off</option>
      <option value="max">Max</option>
    </select>

    <input id="citySpeed" value="30" type="number" step="5">
    <input id="highwaySpeed" value="90" type="number" step="5">
  </div>
</div>

<!-- SPLIT -->
<div class="card">
  <div class="section-title">DRIVING SPLIT</div>

  <input type="range" id="slider" class="slider" value="75">

  <div class="split-row">
    <div>City: <b id="cityShare">75</b>%</div>
    <div>Highway: <b id="highwayShare">25</b>%</div>
  </div>
</div>

</div>

<script>

// ELEMENTS
const engine = document.getElementById("engine");
const ccInput = document.getElementById("cc");
const trans = document.getElementById("trans");
const vehicle = document.getElementById("vehicle");
const style = document.getElementById("style");
const ac = document.getElementById("ac");
const citySpeed = document.getElementById("citySpeed");
const highwaySpeed = document.getElementById("highwaySpeed");
const slider = document.getElementById("slider");

const cityOut = document.getElementById("cityOut");
const highwayOut = document.getElementById("highwayOut");
const overallOut = document.getElementById("overallOut");

const cityShareEl = document.getElementById("cityShare");
const highwayShareEl = document.getElementById("highwayShare");
const tags = document.getElementById("tags");

// FACTORS
const transFactor = {manual:1, cvt:0.88, dct:0.88};
const weightFactor = {hatch:1.08, compactSUV:1, sedan:0.96};
const styleFactor = {normal:1, gentle:1.1, aggressive:0.85};
const acFactor = {off:1.05, normal:0.97, max:0.88};

// MODELS
function cityNA(cc,s){
  let base = 4.5 + 0.22*s - 0.0015*s*s;
  return base * Math.pow(1500/cc,0.6);
}

function highwayNA(cc,s){
  return (36000/cc)/(1+0.012*s+0.00018*s*s);
}

function highwayTurbo(cc,s){
  let base=(38000/cc)/(1+0.013*s+0.0002*s*s);
  let f = s<60?0.90 : s<75?1.05 : s<90?1.12 : s<105?0.92 : 0.82;
  return base*f;
}

function turboFactor(s){
  if(s<25)return 1.45;
  if(s<35)return 1.30;
  if(s<50)return 1.15;
  return 1.05;
}

function turboCityLoad(cs){
  return 1+(cs/100)*0.25;
}

function dieselFactor(cs,s){
  return 1.55*(1+(cs/100)*0.15);
}

// MAIN
function calc(){

  let cc = +ccInput.value;
  let cs = +citySpeed.value;
  let hs = +highwaySpeed.value;

  let cityPct = +slider.value;
  let highwayPct = 100 - cityPct;

  cityShareEl.innerText = cityPct;
  highwayShareEl.innerText = highwayPct;

  let city = cityNA(cc,cs);
  let highway = engine.value==="turbo" ? highwayTurbo(cc,hs) : highwayNA(cc,hs);

  if(engine.value==="turbo"){
    city/=turboFactor(cs);
    city/=turboCityLoad(cityPct);
  }

  if(engine.value==="diesel"){
    city*=dieselFactor(cityPct,cs);
    highway*=dieselFactor(cityPct,hs);
  }

  city*=transFactor[trans.value]*weightFactor[vehicle.value]*styleFactor[style.value]*acFactor[ac.value];
  highway*=transFactor[trans.value]*styleFactor[style.value]*acFactor[ac.value];

  let overall=(city*cityPct+highway*highwayPct)/100;

  city=Math.max(5,city);
  highway=Math.max(6,highway);
  overall=Math.max(6,overall);

  cityOut.innerText = city.toFixed(1);
  highwayOut.innerText = highway.toFixed(1);
  overallOut.innerText = overall.toFixed(1);

  tags.innerHTML = `
    <span class="tag warn">⚠️ Moderate efficiency</span>
    <span class="tag info">Calibrated Model</span>
  `;
}

// EVENTS
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", calc);
});

calc();

</script>

</body>
</html>
